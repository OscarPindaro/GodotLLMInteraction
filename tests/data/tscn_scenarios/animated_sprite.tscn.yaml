description: AnimatedSprite2D with SpriteFrames built from atlas regions of one sheet.
create:
  root_name: Walker
  root_type: Node2D
operations:
  - op: add_ext_resource
    type: Texture2D
    path: res://tests/data/assets/atlas.png
    id: 1_sheet
  - op: create_sub_resource
    type: AtlasTexture
    id: AtlasTexture_walk_0
    properties:
      atlas: 'ExtResource("1_sheet")'
      region: "Rect2(0, 0, 16, 16)"
  - op: create_sub_resource
    type: AtlasTexture
    id: AtlasTexture_walk_1
    properties:
      atlas: 'ExtResource("1_sheet")'
      region: "Rect2(16, 0, 16, 16)"
  - op: create_sub_resource
    type: SpriteFrames
    id: SpriteFrames_walk
    properties:
      animations: '[{
"frames": [{
"duration": 1.0,
"texture": SubResource("AtlasTexture_walk_0")
}, {
"duration": 1.0,
"texture": SubResource("AtlasTexture_walk_1")
}],
"loop": 1,
"name": &"walk",
"speed": 8.0
}]'
  - op: add_node
    path: Sprite
    type: AnimatedSprite2D
    properties:
      sprite_frames: 'SubResource("SpriteFrames_walk")'
      autoplay: '"walk"'
expect:
  node_exists: [Sprite]
  contains:
    - '"name": &"walk"'
    - 'autoplay = "walk"'
